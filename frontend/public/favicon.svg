<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="qel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa" />
      <stop offset="100%" style="stop-color:#ec4899" />
    </linearGradient>
  </defs>
  <!-- Background circle for better visibility in dark/light modes -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0a" />
  <!-- Wordmark 'C' - representing Caryqel as a monogram for the small tab space -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" 
    style="font-family:'Playfair Display', serif; font-weight:800; font-size:22px;">
    <tspan fill="#ffffff">c</tspan><tspan fill="url(#qel-gradient)">q</tspan>
  </text>
</svg>
